spring:
  application:
    name: rag-with-db
  datasource:
    url: jdbc:mysql://localhost:3306/genai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  ai:
    #openai:
    #api-key: ${OPENAI_API_KEY}
    ollama:
      base-url: http://localhost:11434/
      chat:
        options:
          model: llama3
      embedding:
        options:
          model: mxbai-embed-large
    vectorstore:
      qdrant:
        initialize-schema: true
        host: localhost
        port: 6334
        collection-name: ragDb
    docker:
      compose:
        stop:
          command: DOWN
  logging:
    level:
      org:
        springframework:
          ai:
            chat:
              client:
                advisor: DEBUG

server:
  port: 9292